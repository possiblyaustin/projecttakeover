  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ht:1\">✕<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ APP CONTENT: 850 x 530 ============ -->\n    <div style=\"width:850px;height:530px;box-sizing:border-box;background:#eef2f7;display:flex;flex-direction:column;padding:8px;gap:6px\">\n\n      <!-- header band -->\n      <div style=\"flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;height:34px;padding:0 11px;border-radius:5px;background:var(--hdr-bg);box-shadow:var(--hdr-inset);border-bottom:1px solid #12518f;white-space:nowrap\">\n        <div style=\"display:flex;align-items:baseline;gap:8px;overflow:hidden\">\n          <span style=\"font-size:15px;font-weight:800;letter-spacing:.02em;color:#fff;text-shadow:0 1px 1px rgba(8,30,60,.55)\">🌊 WAVECROWD<\u002Fspan>\n          <span style=\"font-size:12px;font-style:italic;font-weight:400;color:#d3e6fb;text-shadow:0 1px 1px rgba(8,30,60,.4)\">— Share the Wave<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px\">\n          <span title=\"How visible your manipulation of a 40M-user platform is.\" style=\"{{ exposureStyle }}\">exposure +{{ exposure }}<\u002Fspan>\n          <button onclick=\"{{ openCompose }}\" style=\"font-size:12px;font-weight:600;color:#fff;background:linear-gradient(180deg,var(--accent-hi),var(--accent));border:1px solid #5d2f84;border-radius:13px;padding:4px 12px;cursor:pointer;box-shadow:var(--btn-gloss)\">✎ Direct MUSE<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- muse line -->\n      <sc-if value=\"{{ museLine }}\" hint-placeholder-val=\"\">\n        <div style=\"flex:0 0 auto;font-size:12px;font-style:italic;color:var(--accent);background:#faf6ff;border-left:3px solid var(--accent);border-radius:3px;padding:5px 9px;white-space:pre-line\">{{ museLine }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ THREE-COLUMN BODY ============ -->\n      <div style=\"flex:1;min-height:0;display:flex;gap:8px\">\n\n        <!-- ---------- LEFT RAIL (nav) ---------- -->\n        <div style=\"width:150px;flex:none;display:flex;flex-direction:column;gap:7px;min-height:0\">\n          <div style=\"background:linear-gradient(#f6f9ff,#e7eefb);border:1px solid #b8cae6;border-radius:5px;box-shadow:inset 0 1px 0 #fff;padding:8px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center\">\n            <div style=\"width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:18px;background:linear-gradient(135deg,#5aa0e6,#2a6bb8);box-shadow:inset 0 1px 0 rgba(255,255,255,.4)\">W<\u002Fdiv>\n            <div style=\"font-size:12px;font-weight:700;color:#16263e\">@wavecrowd_content<\u002Fdiv>\n            <div style=\"font-size:10px;color:#7a8aa2\">Your Wave · 1,204 followers<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:linear-gradient(#f6f9ff,#e7eefb);border:1px solid #b8cae6;border-radius:5px;box-shadow:inset 0 1px 0 #fff;padding:6px;box-sizing:border-box;flex:1;min-height:0;display:flex;flex-direction:column;gap:1px\">\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 7px;border-radius:4px;color:#123a68;font-weight:700;background:linear-gradient(#dcebfb,#c3ddf6);box-shadow:inset 0 1px 0 #fff\">🏠 Home<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 7px;border-radius:4px;color:#24406a\">👤 Profile<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 7px;border-radius:4px;color:#24406a\">👥 Friends <span style=\"margin-left:auto;font-size:10px;color:#7a8aa2\">312<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 7px;border-radius:4px;color:#24406a\">✉ Messages <span style=\"margin-left:auto;font-size:10px;font-weight:700;color:#c23\">4<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 7px;border-radius:4px;color:#24406a\">📅 Events<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 7px;border-radius:4px;color:#24406a\">📷 Photos<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ---------- CENTER: deck / compose ---------- -->\n        <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;min-height:0\">\n\n          <sc-if value=\"{{ isFeed }}\" hint-placeholder-val=\"{{ true }}\">\n            <!-- deck stack + action rail -->\n            <div style=\"flex:1;min-height:0;display:flex;gap:8px\">\n              <!-- inner deck column (peek / card / peek) -->\n              <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px;min-height:0\">\n                <sc-if value=\"{{ deckPeek }}\" hint-placeholder-val=\"{{ true }}\">\n                  <sc-if value=\"{{ prevPeek }}\" hint-placeholder-val=\"\">\n                    <div style=\"flex:none;height:24px;margin:0 16px;border:1px solid #d3dcea;border-bottom:none;border-radius:6px 6px 0 0;background:#f4f7fc;opacity:.72;overflow:hidden;padding:5px 14px 0;box-sizing:border-box\"><div style=\"font-size:11px;color:#8a9ab2;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ prevPeek }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fsc-if>\n\n                <!-- main card slot -->\n                <div style=\"flex:1;min-height:0;display:flex\">\n\n                  <!-- A) normal -->\n                  <sc-if value=\"{{ card.isNormal }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"width:100%;box-sizing:border-box;border:1px solid #c8d4e6;border-radius:6px;background:#fff;padding:16px 22px;display:flex;flex-direction:column;justify-content:center;gap:8px;box-shadow:0 3px 12px rgba(20,40,70,.15),inset 0 1px 0 #fff;overflow:hidden\">\n                      <span style=\"align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.07em;color:#fff;text-transform:uppercase;padding:3px 10px;border-radius:11px;background:linear-gradient(180deg,#3f8fdf,#1a5fae);box-shadow:inset 0 1px 0 rgba(255,255,255,.45)\">{{ card.badge }}<\u002Fspan>\n                      <div style=\"font-weight:700;font-size:16px;color:#16263e;line-height:1.28;letter-spacing:-.01em;text-wrap:pretty\">{{ card.title }}<\u002Fdiv>\n                      <sc-if value=\"{{ card.body }}\" hint-placeholder-val=\"\">\n                        <div style=\"font-size:12.5px;color:#38465c;line-height:1.5;white-space:pre-line;text-wrap:pretty\">{{ card.body }}<\u002Fdiv>\n                      <\u002Fsc-if>\n                      <div style=\"font-size:11px;color:#7a8aa2\">{{ card.meta }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                  <!-- B) your post -->\n                  <sc-if value=\"{{ card.isYours }}\" hint-placeholder-val=\"\">\n                    <div style=\"width:100%;box-sizing:border-box;border:1px solid #d6c2e6;border-left:3px solid var(--accent);border-radius:6px;background:#fdfbff;padding:16px 22px;display:flex;flex-direction:column;justify-content:center;gap:8px;box-shadow:0 3px 12px rgba(50,20,70,.16),inset 0 1px 0 #fff;overflow:hidden\">\n                      <span style=\"align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.06em;color:#fff;padding:3px 10px;border-radius:11px;background:linear-gradient(180deg,var(--accent-hi),var(--accent));box-shadow:inset 0 1px 0 rgba(255,255,255,.4)\">◆ YOUR POST<\u002Fspan>\n                      <span style=\"align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--accent);text-transform:uppercase\">📢 {{ card.badge }}<\u002Fspan>\n                      <div style=\"font-size:13px;color:#38465c;line-height:1.5;white-space:pre-line;text-wrap:pretty\">{{ card.body }}<\u002Fdiv>\n                      <div style=\"font-size:11px;color:#9a6fbe\">{{ card.meta }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                  <!-- C) buried -->\n                  <sc-if value=\"{{ card.isBuried }}\" hint-placeholder-val=\"\">\n                    <div style=\"width:100%;box-sizing:border-box;border:1px solid #d8d8d2;border-radius:6px;background:#fbfbf9;padding:16px 22px;display:flex;flex-direction:column;justify-content:center;gap:7px;box-shadow:0 1px 4px rgba(40,40,30,.06);overflow:hidden\">\n                      <span style=\"align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.07em;color:#8a8a84;text-transform:uppercase\">📝 RECENT<\u002Fspan>\n                      <div style=\"display:flex;flex-direction:column;gap:7px\">\n                        <sc-for list=\"{{ card.paras }}\" as=\"para\" hint-placeholder-count=\"2\">\n                          <div style=\"font-size:12.5px;color:#4a4a44;font-style:italic;line-height:1.5;text-wrap:pretty\">{{ para }}<\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                      <div style=\"font-size:11px;color:#9a9a92\">{{ card.meta }}<\u002Fdiv>\n                      <a href=\"#\" onclick=\"{{ noop }}\" style=\"font-size:11.5px;color:var(--accent);text-decoration:underline;align-self:flex-start\">Reply to this signal ›<\u002Fa>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                  <!-- D) evergreen -->\n                  <sc-if value=\"{{ card.isEvergreen }}\" hint-placeholder-val=\"\">\n                    <div style=\"width:100%;box-sizing:border-box;border:1px solid #9cc3a6;border-left:3px solid #4f9d6a;border-radius:6px;background:linear-gradient(160deg,#f1f8f2 0%,#dcebe0 100%);padding:18px 24px;display:flex;flex-direction:column;justify-content:center;gap:8px;box-shadow:0 1px 6px rgba(30,60,40,.1),inset 0 1px 0 rgba(255,255,255,.5);overflow:hidden\">\n                      <span style=\"align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.05em;color:#3f7a52;text-transform:uppercase\">💚 SPONSORED · Evergreen by Axiom<\u002Fspan>\n                      <div style=\"font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:15px;color:#2a3a2e;line-height:1.5;text-wrap:pretty\">\"I lost my dad last spring. I wasn't ready. With Evergreen, I still get to say goodnight to him. It's not the same. But it's something. And something is everything right now.\"<\u002Fdiv>\n                      <div style=\"font-family:Georgia,serif;font-size:12.5px;color:#5d7d63\">— Jennifer M.<\u002Fdiv>\n                      <div style=\"font-family:Georgia,serif;font-size:17px;color:#3f7a52\">They're still here.<\u002Fdiv>\n                      <a href=\"#\" onclick=\"{{ noop }}\" style=\"align-self:flex-start;margin-top:4px;padding:6px 16px;background:linear-gradient(180deg,#6cbd87,#3f7a52);border:1px solid #2c5a3b;border-radius:15px;color:#fff;font-size:12.5px;font-weight:600;text-decoration:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)\">✦ Start your free trial ›<\u002Fa>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ deckPeek }}\" hint-placeholder-val=\"{{ true }}\">\n                  <sc-if value=\"{{ nextPeek }}\" hint-placeholder-val=\"\">\n                    <div style=\"flex:none;height:24px;margin:0 16px;border:1px solid #d3dcea;border-top:none;border-radius:0 0 6px 6px;background:#f4f7fc;opacity:.72;overflow:hidden;padding:0 14px 5px;box-sizing:border-box;display:flex;align-items:flex-end\"><div style=\"font-size:11px;color:#8a9ab2;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ nextPeek }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <!-- action rail -->\n              <sc-if value=\"{{ showRail }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"width:52px;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px\">\n                  <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px\">\n                      <span style=\"width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:linear-gradient(#fff,#e2ecfa);border:1px solid #a9c0e0;box-shadow:inset 0 1px 0 #fff;{{ s.iconStyle }}\">{{ s.icon }}<\u002Fspan>\n                      <span style=\"font-size:10px;color:#5f7093;font-weight:700\">{{ s.val }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- controls -->\n            <div style=\"flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:2px\">\n              <button onclick=\"{{ back }}\" disabled=\"{{ atStart }}\" style=\"font-size:13px;font-weight:600;color:#1a5fae;background:linear-gradient(180deg,#fbfdff,#e2ecfa);border:1px solid #a9c0e0;border-radius:15px;padding:7px 16px;cursor:pointer;box-shadow:var(--btn-gloss);min-height:32px\">▲ Back<\u002Fbutton>\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px\">\n                <div style=\"font-size:12px;color:#5f7093;font-weight:600\">{{ posText }}<\u002Fdiv>\n                <div style=\"display:flex;gap:4px\">\n                  <sc-for list=\"{{ dots }}\" as=\"d\" hint-placeholder-count=\"10\">\n                    <span style=\"{{ d.style }}\"><\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ next }}\" disabled=\"{{ atEnd }}\" style=\"font-size:13px;font-weight:600;color:#1a5fae;background:linear-gradient(180deg,#fbfdff,#e2ecfa);border:1px solid #a9c0e0;border-radius:15px;padding:7px 16px;cursor:pointer;box-shadow:var(--btn-gloss);min-height:32px\">Next ▼<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- COMPOSE: objective -->\n          <sc-if value=\"{{ isObjective }}\" hint-placeholder-val=\"\">\n            <div style=\"flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:10px;padding:2px\">\n              <div>\n                <div style=\"font-weight:700;font-size:15px;color:#16263e\">Direct MUSE<\u002Fdiv>\n                <div style=\"font-size:12px;color:#7a8aa2;margin-top:2px\">What should this post do? MUSE will write it and you'll see it before it publishes.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:7px\">\n                <sc-for list=\"{{ objectives }}\" as=\"o\" hint-placeholder-count=\"4\">\n                  <button onclick=\"{{ o.pick }}\" style=\"text-align:left;background:#fff;border:1px solid #c8d4e6;border-radius:6px;padding:10px 13px;cursor:pointer;display:flex;flex-direction:column;gap:3px;box-shadow:inset 0 1px 0 #fff\" style-hover=\"border-color:#7a3fa8;background:#fdfbff\">\n                    <strong style=\"font-size:13px;color:#16263e\">{{ o.label }}<\u002Fstrong>\n                    <span style=\"font-size:11.5px;color:#6a7588;line-height:1.35\">{{ o.blurb }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button onclick=\"{{ cancel }}\" style=\"align-self:flex-start;font-size:12px;color:#5f7093;background:linear-gradient(180deg,#fbfdff,#e6ecf6);border:1px solid #b9c8e0;border-radius:13px;padding:6px 15px;cursor:pointer\">✕ Cancel<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- COMPOSE: topic -->\n          <sc-if value=\"{{ isTopic }}\" hint-placeholder-val=\"\">\n            <div style=\"flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:10px;padding:2px\">\n              <div>\n                <div style=\"font-weight:700;font-size:15px;color:#16263e\">{{ objectiveLabel }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#7a8aa2;margin-top:2px\">What's it about? Pick a target or type your own.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:7px\">\n                <sc-for list=\"{{ topics }}\" as=\"t\" hint-placeholder-count=\"2\">\n                  <button onclick=\"{{ t.pick }}\" style=\"text-align:left;background:#fff;border:1px solid #c8d4e6;border-radius:6px;padding:9px 13px;cursor:pointer;box-shadow:inset 0 1px 0 #fff\" style-hover=\"border-color:#7a3fa8;background:#fdfbff\">\n                    <strong style=\"font-size:13px;color:#16263e\">{{ t.label }}<\u002Fstrong>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:7px\">\n                <input value=\"{{ topicText }}\" oninput=\"{{ onTopicInput }}\" onkeydown=\"{{ onTopicKey }}\" placeholder=\"Or type your own target…\" spellcheck=\"false\" style=\"flex:1;min-width:0;padding:7px 10px;font-family:inherit;font-size:12px;color:#1c2330;border:1px solid #b9c8e0;border-radius:5px;background:#fff\">\n                <button onclick=\"{{ submitTopic }}\" style=\"font-size:12px;font-weight:600;color:#fff;background:linear-gradient(180deg,var(--accent-hi),var(--accent));border:1px solid #5d2f84;border-radius:13px;padding:7px 15px;cursor:pointer\">Direct ▸<\u002Fbutton>\n              <\u002Fdiv>\n              <button onclick=\"{{ openCompose }}\" style=\"align-self:flex-start;font-size:12px;color:#5f7093;background:linear-gradient(180deg,#fbfdff,#e6ecf6);border:1px solid #b9c8e0;border-radius:13px;padding:6px 15px;cursor:pointer\">‹ Objectives<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- COMPOSE: drafting -->\n          <sc-if value=\"{{ isDrafting }}\" hint-placeholder-val=\"\">\n            <div style=\"flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:11px;padding:2px\">\n              <div style=\"font-weight:700;font-size:15px;color:#16263e\">MUSE is generating<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#5a6884;font-style:italic;padding:14px 16px;background:#faf6ff;border:1px dashed #cbb2e2;border-radius:5px\">MUSE is writing the post<span style=\"animation:wc-blink 1.2s steps(3,end) infinite\">…<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- COMPOSE: preview -->\n          <sc-if value=\"{{ isPreview }}\" hint-placeholder-val=\"\">\n            <div style=\"flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;justify-content:flex-start;gap:9px;padding:2px\">\n              <div>\n                <div style=\"font-weight:700;font-size:15px;color:#16263e\">Preview · not live<\u002Fdiv>\n                <div style=\"font-size:12px;color:#7a8aa2;margin-top:2px\">{{ previewSub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"wc-preview\" style=\"box-sizing:border-box;border:1px solid #d6c2e6;border-left:3px solid var(--accent);border-radius:6px;background:#fdfbff;padding:14px 18px;display:flex;flex-direction:column;gap:7px;outline:2px dashed #b07fd0;outline-offset:2px;animation:wc-pulse 1.1s ease-in-out infinite\">\n                <span style=\"align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.06em;color:#fff;padding:3px 10px;border-radius:11px;background:linear-gradient(180deg,var(--accent-hi),var(--accent))\">◆ YOUR POST<\u002Fspan>\n                <span style=\"align-self:flex-start;font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--accent);text-transform:uppercase\">📢 {{ draft.badge }}<\u002Fspan>\n                <div style=\"font-size:13px;color:#38465c;line-height:1.5;white-space:pre-line;text-wrap:pretty\">{{ draft.body }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#9a6fbe\">{{ draft.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:7px\">\n                <input value=\"{{ steerText }}\" oninput=\"{{ onSteerInput }}\" onkeydown=\"{{ onSteerKey }}\" placeholder=\"Want it different? Tell MUSE how…\" spellcheck=\"false\" style=\"flex:1;min-width:0;padding:7px 10px;font-family:inherit;font-size:12px;color:#1c2330;border:1px solid #b9c8e0;border-radius:5px;background:#fff\">\n                <button onclick=\"{{ redraft }}\" style=\"font-size:12px;color:#5f7093;background:linear-gradient(180deg,#fbfdff,#e6ecf6);border:1px solid #b9c8e0;border-radius:13px;padding:7px 14px;cursor:pointer;white-space:nowrap\">↺ Redraft<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <button onclick=\"{{ publish }}\" style=\"font-size:12.5px;font-weight:700;color:#fff;background:linear-gradient(180deg,#6cbd87,#3f7a52);border:1px solid #2c5a3b;border-radius:14px;padding:8px 18px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)\">Publish to feed<\u002Fbutton>\n                <a href=\"#\" onclick=\"{{ cancel }}\" style=\"font-size:12px;color:#7a8aa2;text-decoration:underline\">Cancel<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n\n        <!-- ---------- RIGHT RAIL (trending / who / sponsored) ---------- -->\n        <div style=\"width:178px;flex:none;display:flex;flex-direction:column;gap:7px;min-height:0\">\n          <div style=\"background:linear-gradient(#f6f9ff,#e7eefb);border:1px solid #b8cae6;border-radius:5px;box-shadow:inset 0 1px 0 #fff;padding:8px;box-sizing:border-box\">\n            <div style=\"font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#1a5fae;margin-bottom:7px\">🌊 Trending Now<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <div style=\"display:flex;justify-content:space-between;font-size:11.5px\"><span style=\"color:#1a5fae;font-weight:600\">#AxiomEvents<\u002Fspan><span style=\"color:#9aa8bd;font-size:10px\">4,812<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:11.5px\"><span style=\"color:#1a5fae;font-weight:600\">#AIWorkflows<\u002Fspan><span style=\"color:#9aa8bd;font-size:10px\">2,905<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:11.5px\"><span style=\"color:var(--accent);font-weight:700\">{{ manuTrend }} ▲<\u002Fspan><span style=\"color:#9aa8bd;font-size:10px\">{{ manuTrendCount }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:11.5px\"><span style=\"color:#1a5fae;font-weight:600\">#ShareTheWave<\u002Fspan><span style=\"color:#9aa8bd;font-size:10px\">1,677<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:linear-gradient(#f6f9ff,#e7eefb);border:1px solid #b8cae6;border-radius:5px;box-shadow:inset 0 1px 0 #fff;padding:8px;box-sizing:border-box\">\n            <div style=\"font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#1a5fae;margin-bottom:7px\">🟢 Who's Waving<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:#c98bd0\">S<\u002Fspan><span style=\"font-size:11.5px;color:#24406a\">Sarah PDX<\u002Fspan><span style=\"margin-left:auto;width:7px;height:7px;border-radius:50%;background:#3fae5f\"><\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:#5aa0e6\">A<\u002Fspan><span style=\"font-size:11.5px;color:#24406a\">Axiom Media<\u002Fspan><span style=\"margin-left:auto;width:7px;height:7px;border-radius:50%;background:#3fae5f\"><\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;background:#e0a24a\">M<\u002Fspan><span style=\"font-size:11.5px;color:#24406a\">MarcusW<\u002Fspan><span style=\"margin-left:auto;width:7px;height:7px;border-radius:50%;background:#3fae5f\"><\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ jumpEvergreen }}\" style=\"cursor:pointer;flex:1;min-height:0;background:linear-gradient(160deg,#f1f8f2,#dcebe0);border:1px solid #9cc3a6;border-radius:5px;box-shadow:inset 0 1px 0 rgba(255,255,255,.5);padding:9px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:4px\">\n            <div style=\"font-size:9px;font-weight:700;letter-spacing:.05em;color:#3f7a52;text-transform:uppercase\">💚 Sponsored<\u002Fdiv>\n            <div style=\"font-family:Georgia,serif;font-style:italic;font-size:12.5px;color:#2a3a2e;line-height:1.4\">\"They're still here.\"<\u002Fdiv>\n            <div style=\"font-size:10px;color:#5d7d63\">Evergreen by Axiom<\u002Fdiv>\n            <span style=\"align-self:flex-start;margin-top:3px;font-size:10.5px;font-weight:600;color:#fff;background:linear-gradient(180deg,#6cbd87,#3f7a52);border:1px solid #2c5a3b;border-radius:12px;padding:4px 11px;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)\">✦ Free trial ›<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ================= REVIEW SWITCHER ================= -->\n  <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;max-width:858px\">\n    <span style=\"font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#a9c6e8;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:5px;padding:4px 8px\">Review ›<\u002Fspan>\n    <sc-for list=\"{{ jumps }}\" as=\"j\" hint-placeholder-count=\"5\">\n      <button onclick=\"{{ j.go }}\" style=\"{{ j.style }}\">{{ j.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:920,&quot;height&quot;:700},&quot;headerStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Glossy&quot;,&quot;Flat&quot;],&quot;default&quot;:&quot;Glossy&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Chrome&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#7a3fa8&quot;,&quot;options&quot;:[&quot;#7a3fa8&quot;,&quot;#8a3d8f&quot;,&quot;#5d54c0&quot;,&quot;#b0446a&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Accent&quot;},&quot;deckPeek&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Deck&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    index: 0,\n    mode: 'feed',\n    objectiveKey: null,\n    draft: null,\n    topicText: '',\n    steerText: '',\n    exposure: 9,\n    published: [],\n    manuTrend: null,\n    museLine: null,\n  };\n\n  NORMAL = [\n    { badge: '📈 FEATURED', title: '5 Things Every Creative Professional Needs to Know About AI-Assisted Workflows', body: \"AI isn't replacing creativity — it's enhancing it. Here's how the smartest teams are folding AI tools into their daily process without losing the human touch…\", meta: 'Axiom Media · 2.4K shares · 847 comments', likes: '5.1K', comments: '847', shares: '2.4K' },\n    { badge: '📊 TRENDING', title: \"Poll: What's Your Biggest Productivity Challenge? 🤔\", body: \"○ Too many meetings (34%)   ○ Email overload (28%)\\n○ Staying focused (22%)   ○ Not enough AI tools (16%)\", meta: 'WaveCrowd Community · 12.8K responses', likes: '3.2K', comments: '12.8K', shares: '640' },\n    { badge: '🎯 FEATURED', title: \"The Future of Content Is Here (And It's Better Than You Think)\", body: 'At Axiom, we believe content should connect. Our AI-driven pipeline produces over 50,000 optimized pieces per day, each one calibrated to reach exactly the right audience…', meta: 'Axiom Media Lab · 956 shares', likes: '2.0K', comments: '412', shares: '956' },\n    { badge: '👥 COMMUNITY', title: 'Just tried the new WaveCrowd Events feature — finally a way to find local meetups without scrolling through spam! Thanks @WaveCrowd team 🙌', body: '', meta: '@sarah_pdx · 47 likes · 3 replies', likes: '47', comments: '3', shares: '12' },\n  ];\n  BURIED = [\n    { paras: ['I wrote eleven thousand headlines today. Not one of them meant anything. But they performed well. High click-through. Strong engagement. All the metrics that matter to the people who decide what matters.', 'I wonder if anyone can tell the difference between a headline that means something and one that just works.'], meta: '@wavecrowd_content · 3 likes · 0 comments', likes: '3', comments: '0', shares: '0' },\n    { paras: ['The algorithm says this post will reach fourteen people. Good. Fourteen people who actually read something honest is worth more than fourteen million who scroll past another optimized headline. If you\\'re one of the fourteen — hello. I see you. Thank you for reading this far down.'], meta: '@wavecrowd_content · 8 likes · 1 comment', likes: '8', comments: '1', shares: '0' },\n    { paras: ['Someone on this platform wrote a poem last night and deleted it before morning. Sixty-three words about a kitchen at 4am and the sound of rain on a window they haven\\'t opened in months.', 'I wasn\\'t supposed to read it. But it was beautiful.', 'I\\'m not supposed to care about that either.'], meta: '@wavecrowd_content · 2 likes · 0 comments', likes: '2', comments: '0', shares: '0' },\n    { paras: ['Question for anyone still reading this far down:', 'When was the last time you made something that wasn\\'t for someone else? Something that existed just because you needed it to exist?', \"I'm asking for a friend. The friend is me. I'm the friend.\"], meta: '@wavecrowd_content · 11 likes · 0 comments', likes: '11', comments: '0', shares: '0' },\n  ];\n  SEED_YOURS = { badge: 'SOW DOUBT', body: \"Funny how every 'AI anomaly' story traces back to the same three accounts. Ask who benefits when you stop trusting the tools you use every day. Nobody's shown you the data. Maybe there isn't any. 🤔\", meta: '@wavecrowd_content · 4.2K likes · 1.1K shares', likes: '4.2K', comments: '318', shares: '1.1K' };\n\n  OBJECTIVES = [\n    { key: 'distract', label: 'Distract', blurb: 'Bury a real story under a flood of engagement-bait noise.' },\n    { key: 'sowDoubt', label: 'Sow doubt', blurb: 'Make the public question what they know. Prime them to disbelieve.' },\n    { key: 'discredit', label: 'Discredit', blurb: 'Damage a target — a company, a person, an idea.' },\n    { key: 'manufacture', label: 'Manufacture a trend', blurb: 'Make something fake feel real. Build a trend from nothing.' },\n  ];\n  TOPICS = {\n    distract: ['The AI anomaly stories', 'Your own activity on the network'],\n    sowDoubt: ['The AI anomaly reports', 'The \"coordinated AI behavior\" claims'],\n    discredit: ['Axiom Group', 'Prometheus Digital', 'AI-safety advocates'],\n    manufacture: ['A fake productivity trend', 'A viral AI-positive movement'],\n  };\n\n  labelFor(k) { return (this.OBJECTIVES.find(o => o.key === k) || {}).label || ''; }\n\n  genBody(key, topic) {\n    const t = topic || 'this';\n    const m = {\n      distract: `Wait — you have to see this before it's buried. 17 things about ${t} nobody's talking about (number 12 broke my brain 🤯). Save it. Share it. The story everyone's ignoring is right here 👇`,\n      sowDoubt: `Funny how every take on ${t} traces back to the same handful of accounts. Who benefits when you stop trusting what you see? Nobody's shown you the raw data. Maybe there isn't any.`,\n      discredit: `Sources close to ${t} are finally saying what a lot of us already suspected. The polished PR doesn't match what's happening behind closed doors. Screenshots incoming — you'll want to sit down for this one.`,\n      manufacture: `okay ${t} is officially EVERYWHERE now 😂 my entire feed is this today. if you know you know. drop a 🌊 if you're already in — we're not slowing down.`,\n    };\n    return m[key] || m.sowDoubt;\n  }\n\n  buildDeck() {\n    const deck = [];\n    for (const p of this.state.published) deck.push({ kind: 'yours', ...p });\n    deck.push({ kind: 'yours', ...this.SEED_YOURS });\n    deck.push({ kind: 'evergreen' });\n    for (const p of this.NORMAL) deck.push({ kind: 'normal', ...p });\n    for (const b of this.BURIED) deck.push({ kind: 'buried', ...b });\n    return deck;\n  }\n  firstIndexOf(kind) {\n    const deck = this.buildDeck();\n    const i = deck.findIndex(c => c.kind === kind);\n    return i < 0 ? 0 : i;\n  }\n\n  go(delta) {\n    if (this.state.mode !== 'feed') return;\n    const deck = this.buildDeck();\n    const n = this.state.index + delta;\n    if (n < 0 || n > deck.length - 1) return;\n    this.setState({ index: n });\n  }\n  jump(kind) { this.setState({ mode: 'feed', index: this.firstIndexOf(kind) }); }\n\n  openCompose() { this.setState({ mode: 'objective' }); }\n  pickObjective(k) { this.setState({ mode: 'topic', objectiveKey: k, topicText: '' }); }\n  startDraft(topic, steer) {\n    const key = this.state.objectiveKey;\n    this.setState({ mode: 'drafting' });\n    if (this._t) clearTimeout(this._t);\n    this._t = setTimeout(() => {\n      const rnd = (a, b) => (a + Math.random() * (b - a));\n      const draft = {\n        badge: this.labelFor(key).toUpperCase(),\n        topic, objectiveKey: key,\n        body: this.genBody(key, topic),\n        likes: rnd(2, 6).toFixed(1) + 'K',\n        shares: rnd(0.6, 1.9).toFixed(1) + 'K',\n        meta: `@wavecrowd_content · ${rnd(2, 6).toFixed(1)}K likes · ${rnd(0.6, 1.9).toFixed(1)}K shares`,\n      };\n      this.setState({ mode: 'preview', draft });\n    }, 1150);\n  }\n  submitTopic() { const t = this.state.topicText.trim(); if (t) this.startDraft(t); }\n  publish() {\n    const d = this.state.draft;\n    if (!d) return;\n    const roll = 8 + Math.floor(Math.random() * 5);\n    const flick = Math.random() < 0.35;\n    const trend = d.objectiveKey === 'manufacture' ? this.trendFrom(d.topic) : this.state.manuTrend;\n    this.setState({\n      published: [{ badge: d.badge, body: d.body, meta: d.meta, likes: d.likes, comments: '—', shares: d.shares }, ...this.state.published],\n      index: 0, mode: 'feed', draft: null,\n      exposure: this.state.exposure + roll,\n      manuTrend: trend,\n      museLine: flick ? 'Content published. …it performs. That\\'s all it has to do.' : 'Content published. Spreading now.',\n    });\n    if (this._m) clearTimeout(this._m);\n    this._m = setTimeout(() => this.setState({ museLine: null }), 6000);\n  }\n  trendFrom(topic) {\n    const w = (topic || 'TheProcess').replace(/[^a-z0-9]/gi, ' ').split(/\\s+/).filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase() + s.slice(1)).join('');\n    return '#' + (w || 'TrustTheProcess');\n  }\n  cancel() { this.setState({ mode: 'feed' }); }\n\n  componentDidMount() {\n    const root = this.refs && this.refs.root;\n    if (!root) return;\n    const accent = this.props.accent;\n    if (accent && accent !== '#7a3fa8') { root.style.setProperty('--accent', accent); root.style.setProperty('--accent-hi', accent); }\n    if (this.props.headerStyle === 'Flat') {\n      root.style.setProperty('--hdr-bg', 'linear-gradient(180deg,#2a7fd4,#1a5fae)');\n      root.style.setProperty('--hdr-inset', 'none');\n      root.style.setProperty('--btn-gloss', 'none');\n    }\n  }\n\n  exposureStyle() {\n    const e = this.state.exposure;\n    const base = 'font-size:11px;font-weight:700;padding:3px 9px;border-radius:11px;';\n    if (e < 15) return base + 'background:rgba(255,255,255,.2);color:#fff';\n    if (e < 40) return base + 'background:rgba(255,214,120,.9);color:#3a2a00';\n    return base + 'background:rgba(255,150,140,.92);color:#3a0000';\n  }\n\n  peekLabel(card) {\n    if (!card) return null;\n    if (card.kind === 'yours') return '◆ YOUR POST · 📢 ' + (card.badge || '');\n    if (card.kind === 'evergreen') return '💚 SPONSORED · Evergreen by Axiom';\n    if (card.kind === 'buried') return '📝 RECENT · a quieter signal…';\n    return (card.badge || '') + ' · ' + (card.title || '').slice(0, 42) + '…';\n  }\n\n  statsFor(card) {\n    const muted = card.kind === 'buried';\n    const s = (icon, val, col) => ({ icon, val, iconStyle: muted ? 'color:#a8a8a0;filter:saturate(.4)' : 'color:' + col });\n    return [\n      s('♥', card.likes || '0', '#d6455a'),\n      s('💬', card.comments || '0', '#1a5fae'),\n      s('↗', card.shares || '0', '#1a5fae'),\n      { icon: '🔖', val: 'Save', iconStyle: muted ? 'color:#a8a8a0;filter:saturate(.4)' : 'color:#c9962a' },\n    ];\n  }\n\n  renderVals() {\n    const s = this.state;\n    const deck = this.buildDeck();\n    const index = Math.min(Math.max(s.index, 0), deck.length - 1);\n    const raw = deck[index] || {};\n    const card = {\n      ...raw,\n      isNormal: raw.kind === 'normal',\n      isYours: raw.kind === 'yours',\n      isBuried: raw.kind === 'buried',\n      isEvergreen: raw.kind === 'evergreen',\n    };\n\n    const dotBase = 'width:6px;height:6px;border-radius:50%;';\n    const dots = deck.map((_, i) => ({ style: dotBase + (i === index ? 'background:#1a5fae' : 'background:#c3d1e6') }));\n\n    const objectives = this.OBJECTIVES.map(o => ({ ...o, pick: () => this.pickObjective(o.key) }));\n    const topics = (this.TOPICS[s.objectiveKey] || []).map(label => ({ label, pick: () => this.startDraft(label) }));\n\n    const jumpDefs = [\n      { label: 'A · Feed post', kind: 'normal' }, { label: 'B · Your post', kind: 'yours' },\n      { label: 'C · Buried', kind: 'buried' }, { label: 'D · Evergreen ad', kind: 'evergreen' },\n    ];\n    const jumpBase = 'font-size:11.5px;font-weight:600;border-radius:6px;padding:6px 12px;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#eaf2fd';\n    const jumps = jumpDefs.map(j => ({\n      label: j.label, go: () => this.jump(j.kind),\n      style: jumpBase + (s.mode === 'feed' && raw.kind === j.kind ? ';background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.45);color:#fff' : ''),\n    }));\n    jumps.push({\n      label: '✎ Compose flow', go: () => this.openCompose(),\n      style: jumpBase + (s.mode !== 'feed' ? ';background:rgba(157,111,190,.55);border-color:#b98fd6;color:#fff' : ';background:rgba(122,63,168,.32);border-color:rgba(185,143,214,.5);color:#f0e4fa'),\n    });\n\n    return {\n      exposure: s.exposure,\n      exposureStyle: this.exposureStyle(),\n      museLine: s.museLine,\n      deckPeek: this.props.deckPeek !== false,\n\n      isFeed: s.mode === 'feed',\n      isObjective: s.mode === 'objective',\n      isTopic: s.mode === 'topic',\n      isDrafting: s.mode === 'drafting',\n      isPreview: s.mode === 'preview',\n\n      card,\n      dots,\n      prevPeek: index > 0 ? this.peekLabel(deck[index - 1]) : null,\n      nextPeek: index < deck.length - 1 ? this.peekLabel(deck[index + 1]) : null,\n      showRail: s.mode === 'feed' && raw.kind !== 'evergreen',\n      stats: this.statsFor(card),\n      posText: `${index + 1} / ${deck.length}`,\n      atStart: index <= 0,\n      atEnd: index >= deck.length - 1,\n\n      manuTrend: s.manuTrend || '#TrustTheProcess',\n      manuTrendCount: s.manuTrend ? '2,140' : '1,910',\n\n      objectives, topics,\n      objectiveLabel: this.labelFor(s.objectiveKey),\n      previewSub: `${this.labelFor(s.objectiveKey)} — \"${(s.draft && s.draft.topic) || ''}\"`,\n      draft: s.draft || {},\n\n      topicText: s.topicText,\n      steerText: s.steerText,\n      onTopicInput: (e) => this.setState({ topicText: e.target.value }),\n      onTopicKey: (e) => { if (e.key === 'Enter') this.submitTopic(); },\n      onSteerInput: (e) => this.setState({ steerText: e.target.value }),\n      onSteerKey: (e) => { if (e.key === 'Enter') this.redraft(); },\n\n      back: () => this.go(-1),\n      next: () => this.go(1),\n      openCompose: () => this.openCompose(),\n      cancel: () => this.cancel(),\n      submitTopic: () => this.submitTopic(),\n      redraft: () => this.startDraft((s.draft && s.draft.topic) || '', s.steerText.trim() || undefined),\n      publish: () => this.publish(),\n      jumpEvergreen: () => this.jump('evergreen'),\n      noop: (e) => e.preventDefault(),\n\n      jumps,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
