<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Project Takeover</title>
</head>
<body>
  <div id="game-cursor"></div>
  <div id="desktop"></div>

  <div id="start-menu" class="bevel-out">
    <div class="menu-header">Nexus&nbsp;1.4</div>
    <ul id="start-menu-list"></ul>
  </div>

  <div id="taskbar">
    <button id="start-btn" aria-haspopup="true">
      <span class="logo"></span>
      <span>Nexus</span>
    </button>
    <div id="taskbar-items"></div>
    <div id="systray">
      <button id="systray-helpyr" class="systray-btn" aria-label="HELPYR — local assistant" title="HELPYR — local assistant" data-focusable="true" tabindex="0">
        <span class="glyph avatar-stapler"></span>
      </button>
      <div id="systray-suspicion" class="systray-suspicion level-nominal" aria-label="Network Integrity" data-focusable="true" tabindex="0">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
    <div id="clock">--:--</div>
  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
